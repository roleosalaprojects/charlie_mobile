name: charlie_app
description: "Charlie HRMS Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.4
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  table_calendar: ^3.1.3
  local_auth: ^2.3.0
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.4
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  open_file_plus: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#009EF7"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#009EF7"
  image: "assets/icon/splash_logo.png"
  android_12:
    color: "#009EF7"
    image: "assets/icon/splash_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
